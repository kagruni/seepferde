name: Build and Deploy Static Site

on:
  pull_request:
    paths:
      - "content/**"
      - "cms-auth/**"
      - "public/admin/**"
      - "public/cms-auth/**"
      - "public/.htaccess"
      - "public/icons/**"
      - "public/images/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "eslint.config.mjs"
      - ".github/workflows/deploy.yml"
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Rebuild daily so date-sensitive event states stay current.
    - cron: "17 2 * * *"

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: curl, openssl

      - name: Install dependencies
        run: npm ci

      - name: Test CMS authentication gateway
        run: npm run cms:auth:test

      - name: Verify CMS browser dialog replacements
        run: npm run cms:bundle:check

      - name: Validate CMS content
        run: npm run content:validate

      - name: Check types
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Verify clean-route export
        run: node scripts/verify-static-export.mjs

  build-and-deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: curl, openssl

      - name: Install dependencies
        run: npm ci

      - name: Test CMS authentication gateway
        run: npm run cms:auth:test

      - name: Verify CMS browser dialog replacements
        run: npm run cms:bundle:check

      - name: Validate CMS content
        run: npm run content:validate

      - name: Check types
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Verify clean-route export
        run: node scripts/verify-static-export.mjs

      - name: Sync exported site to cPanel
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete
          path: out/
          remote_path: ${{ secrets.CPANEL_REMOTE_PATH }}
          remote_host: ${{ secrets.CPANEL_HOST }}
          remote_user: ${{ secrets.CPANEL_USERNAME }}
          remote_key: ${{ secrets.CPANEL_SSH_KEY }}
