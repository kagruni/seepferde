      - { label: Events, field: category, pattern: events }
    view_groups:
      - { label: Kategorie, field: category }
    fields:
      - { label: Titel, name: title, widget: string, hint: Ein kurzer interner Name, der das Bild leicht wiedererkennbar macht., pattern: ['^.{2,100}$', 'Bitte verwenden Sie 2 bis 100 Zeichen.'] }
      - { label: Auf Website anzeigen, name: published, widget: boolean, default: true, hint: Das Ausschalten verbirgt das Bild in der Galerie. }
      - label: Bild
