      - { label: Auf Website anzeigen, name: enabled, widget: boolean, default: false, hint: Erst einschalten, wenn Text, Zeitraum und Link geprüft sind. Ein gespeicherter Entwurf ist trotzdem noch nicht veröffentlicht. }
      - label: Meldung
        name: message
        widget: text
        hint: Die eigentliche Banner-Nachricht. Maximal 220 Zeichen.
        pattern: ['^[\s\S]{1,220}$', 'Bitte kürzen Sie die Meldung auf höchstens 220 Zeichen.']
      - label: Darstellung
        name: variant
        widget: select
        default: info
        options:
          - { label: Information, value: info }
          - { label: Erfolg, value: success }
          - { label: Wichtig, value: warning }
      - label: Startdatum
        name: startDate
        widget: datetime
        required: false
        date_format: DD.MM.YYYY
        time_format: false
        format: YYYY-MM-DD
        picker_utc: false
        hint: Optional und einschließlich. Ohne Datum erscheint ein eingeschalteter Hinweis sofort nach der Veröffentlichung.
      - label: Enddatum
        name: endDate
        widget: datetime
        required: false
        date_format: DD.MM.YYYY
        time_format: false
        format: YYYY-MM-DD
        picker_utc: false
        hint: Optional und einschließlich. Geplante Wechsel werden durch den täglichen statischen Build sichtbar.
      - { label: Link-Text, name: linkLabel, widget: string, required: false, hint: Muss zusammen mit einem Link-Ziel ausgefüllt werden., pattern: ['^.{0,40}$', 'Bitte verwenden Sie höchstens 40 Zeichen.'] }
      - label: Link-Ziel
        name: linkHref
        widget: string
        required: false
        hint: Interne Links beginnen mit /, externe Links vollständig mit https://.
        pattern: ['^$|^(\/|https:\/\/).+', 'Bitte verwenden Sie einen internen Link ab / oder eine vollständige https://-Adresse.']
      - { label: Reihenfolge, name: sortOrder, widget: number, value_type: int, min: 0, max: 9999, default: 100, hint: Wenn mehrere Hinweise gleichzeitig gelten, erscheinen kleine Zahlen zuerst. }

  - name: legal
    label: Rechtliches
    label_singular: Rechtlicher Inhalt
    description: Unternehmensangaben, Impressum und Datenschutz. Änderungen an Rechtstexten müssen fachlich geprüft werden.
    delete: false
    files:
      - name: legal_settings
        label: Unternehmensangaben
        file: content/settings/legal.json
        preview_path: impressum
        fields:
          - { label: Rechtlicher Name, name: legalName, widget: string, pattern: ['^.{2,140}$', 'Bitte verwenden Sie 2 bis 140 Zeichen.'] }
          - { label: Rechtsform, name: legalForm, widget: string, required: false, hint: Nur ausfüllen, wenn eine Rechtsform geführt wird., pattern: ['^.{0,80}$', 'Bitte verwenden Sie höchstens 80 Zeichen.'] }
          - { label: Registergericht, name: registerCourt, widget: string, required: false, pattern: ['^.{0,120}$', 'Bitte verwenden Sie höchstens 120 Zeichen.'] }
          - { label: Registernummer, name: registerNumber, widget: string, required: false, pattern: ['^.{0,80}$', 'Bitte verwenden Sie höchstens 80 Zeichen.'] }
          - { label: Steuernummer, name: taxNumber, widget: string, required: false, hint: Nur veröffentlichen, wenn dies rechtlich vorgesehen und fachlich geprüft wurde., pattern: ['^.{0,80}$', 'Bitte verwenden Sie höchstens 80 Zeichen.'] }
          - label: Vertretungsberechtigte Personen
            name: managingPersons
            widget: list
            min: 1
            max: 8
            label_singular: Person hinzufügen
            field: { label: Name, name: person, widget: string, pattern: ['^.{2,120}$', 'Bitte verwenden Sie 2 bis 120 Zeichen.'] }
          - { label: Inhaltlich verantwortliche Person, name: contentResponsibleName, widget: string, pattern: ['^.{2,120}$', 'Bitte verwenden Sie 2 bis 120 Zeichen.'] }
          - { label: Anschrift der inhaltlich verantwortlichen Person, name: contentResponsibleAddress, widget: text, hint: Nur ausfüllen, wenn diese Anschrift von den Website-Einstellungen abweicht oder ausdrücklich benötigt wird., pattern: ['^[\s\S]{2,260}$', 'Bitte verwenden Sie 2 bis 260 Zeichen.'] }

      - name: imprint
        label: Impressum
        file: content/legal/imprint.md
        preview_path: impressum
        fields:
          - { label: Seitentitel, name: title, widget: string, pattern: ['^.{2,90}$', 'Bitte verwenden Sie 2 bis 90 Zeichen.'] }
          - label: Zuletzt fachlich geprüft am
            name: lastReviewedAt
            widget: datetime
            required: false
            date_format: DD.MM.YYYY
            time_format: false
            format: YYYY-MM-DD
            picker_utc: false
            hint: Dieses Datum bestätigt keine automatische Rechtssicherheit. Tragen Sie nur eine echte fachliche Prüfung ein.
          - { label: Geprüft durch, name: reviewedBy, widget: string, required: false, hint: Name oder Stelle, die den Inhalt zuletzt fachlich geprüft hat., pattern: ['^$|^.{2,140}$', 'Bitte leer lassen oder 2 bis 140 Zeichen verwenden.'] }
          - label: Rechtlicher Inhalt
            name: body
            widget: richtext
            buttons: [bold, italic, link, heading-two, heading-three, bulleted-list, numbered-list, quote]
            editor_components: []
            modes: [rich_text]
            sanitize_preview: true
            hint: Rechtstexte bitte nur nach fachlicher Prüfung ändern. Kontaktdaten und Unternehmensangaben werden, soweit möglich, automatisch ergänzt.

      - name: privacy
        label: Datenschutz
        file: content/legal/privacy.md
        preview_path: datenschutz
        fields:
          - { label: Seitentitel, name: title, widget: string, pattern: ['^.{2,90}$', 'Bitte verwenden Sie 2 bis 90 Zeichen.'] }
          - label: Zuletzt fachlich geprüft am
            name: lastReviewedAt
            widget: datetime
            required: false
            date_format: DD.MM.YYYY
            time_format: false
            format: YYYY-MM-DD
            picker_utc: false
            hint: Dieses Datum bestätigt keine automatische Rechtssicherheit. Tragen Sie nur eine echte fachliche Prüfung ein.
          - { label: Geprüft durch, name: reviewedBy, widget: string, required: false, hint: Name oder Stelle, die den Inhalt zuletzt fachlich geprüft hat., pattern: ['^$|^.{2,140}$', 'Bitte leer lassen oder 2 bis 140 Zeichen verwenden.'] }
          - label: Rechtlicher Inhalt
            name: body
            widget: richtext
            buttons: [bold, italic, link, heading-two, heading-three, bulleted-list, numbered-list, quote]
            editor_components: []
            modes: [rich_text]
            sanitize_preview: true
            hint: Rechtstexte bitte nur nach fachlicher Prüfung ändern. Prüfen Sie insbesondere Kontaktformular, Karten, Hosting und eingebundene Dienste.

  - name: settings
    label: Website-Einstellungen
    label_singular: Website-Einstellung
    description: Selten geänderte Kontaktdaten, Adresse und globale Suchmaschinen-Angaben. Änderungen wirken an vielen Stellen der Website.
    delete: false
    files:
      - name: site
        label: Kontakt & Website
        file: content/settings/site.json
        preview_path: kontakt
        fields:
          - { label: Öffentlicher Betriebsname, name: businessName, widget: string, hint: Dieser Name erscheint unter anderem im Footer und in Suchmaschinen-Daten., pattern: ['^.{2,120}$', 'Bitte verwenden Sie 2 bis 120 Zeichen.'] }
          - label: Telefonnummer
            name: phone
            widget: string
            required: false
            hint: Öffentlich sichtbar. Bitte mit Vorwahl eingeben, zum Beispiel +49 341 1234567.
            pattern: ['^$|^\+?[0-9][0-9 ()\/.-]{5,}$', 'Bitte lassen Sie das Feld leer oder geben Sie eine echte Telefonnummer mit Vorwahl ein; Platzhalter sind nicht zulässig.']
          - label: E-Mail-Adresse
            name: email
            widget: string
            required: false
            hint: Öffentlich sichtbar und Ziel der Kontaktanfragen.
            pattern: ['^$|^[^\s@]+@[^\s@]+\.[^\s@]+$', 'Bitte lassen Sie das Feld leer oder geben Sie eine vollständige E-Mail-Adresse wie name@beispiel.de ein.']
          - { label: Erreichbarkeit, name: availabilityText, widget: string, hint: 'Zum Beispiel: „Termine nach Vereinbarung“.', pattern: ['^.{2,120}$', 'Bitte verwenden Sie 2 bis 120 Zeichen.'] }
          - { label: Hinweis im Footer, name: footerNote, widget: text, hint: Ein kurzer hilfreicher Satz unter den Kontaktdaten., pattern: ['^[\s\S]{2,260}$', 'Bitte verwenden Sie 2 bis 260 Zeichen.'] }
          - { label: Straße und Hausnummer, name: street, widget: string, pattern: ['^.{2,120}$', 'Bitte verwenden Sie 2 bis 120 Zeichen.'] }
          - { label: Postleitzahl, name: postalCode, widget: string, pattern: ['^\d{5}$', 'Bitte geben Sie eine fünfstellige deutsche Postleitzahl ein.'] }
          - { label: Ort, name: city, widget: string, pattern: ['^.{2,100}$', 'Bitte verwenden Sie 2 bis 100 Zeichen.'] }
          - label: Land
            name: countryCode
            widget: select
            default: DE
            options:
              - { label: Deutschland, value: DE }
          - label: Standort auf der Karte
            name: mapLocation
            widget: map
            type: Point
            decimals: 6
            hint: Setzen Sie den Punkt genau am Hof. Daraus erzeugt die Website die OpenStreetMap-Karte und Standortdaten.
          - label: Standardbeschreibung für Suchmaschinen
            name: defaultDescription
            widget: text
            hint: Wird verwendet, wenn eine Seite keine eigene SEO-Beschreibung hat. Maximal 160 Zeichen.
            pattern: ['^[\s\S]{1,160}$', 'Bitte verwenden Sie höchstens 160 Zeichen.']
          - label: Standard-Vorschaubild für Social Media
            name: defaultSocialImage
            widget: image
            choose_url: false
            media_library: *image_upload_limit
            hint: Querformat, empfohlen 1200 × 630 Pixel.
          - { label: Bildbeschreibung des Standard-Vorschaubilds, name: defaultSocialImageAlt, widget: string, pattern: ['^[\s\S]{8,180}$', 'Bitte schreiben Sie eine aussagekräftige Bildbeschreibung mit 8 bis 180 Zeichen.'] }
