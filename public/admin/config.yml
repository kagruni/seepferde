# Website-Verwaltung for See-Pferde Zwenkau.
# The owner signs in through the server-side username/password gateway. GitHub
# App credentials and password hashes live only in the private cPanel config.
backend:
  name: github
  repo: kagruni/seepferde
  branch: main
  base_url: https://mandykolatka.kajik.dev
  # The public route names deliberately avoid `auth`, `login`, and `api` because
  # the cPanel ModSecurity rules reject those path segments with HTTP 406.
  auth_endpoint: cms-auth/form
  api_root: https://mandykolatka.kajik.dev/cms-auth/repository
  site_domain: mandykolatka.kajik.dev
  use_graphql: false
  squash_merges: true
  commit_messages:
    create: 'CMS: {{collection}} „{{slug}}“ erstellen'
    update: 'CMS: {{collection}} „{{slug}}“ aktualisieren'
    delete: 'CMS: {{collection}} „{{slug}}“ löschen'
    uploadMedia: 'CMS: Bild „{{path}}“ hochladen'
    deleteMedia: 'CMS: Bild „{{path}}“ löschen'

local_backend:
  # 8081 is already used by another local project on this workstation.
  # Use IPv4 explicitly because the proxy is intentionally bound to 127.0.0.1.
  url: http://127.0.0.1:8082/api/v1
locale: de
publish_mode: editorial_workflow

site_url: https://mandykolatka.kajik.dev
display_url: https://mandykolatka.kajik.dev
show_preview_links: true

logo:
  src: /icons/logo.svg
  show_in_header: true

media_folder: public/images/uploads
public_folder: /images/uploads

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: '-'

collections:
  - name: pages
    label: Seiten
    label_singular: Seite
    description: Texte, Bilder und Suchmaschinen-Angaben der festen Website-Seiten.
    delete: false
    files:
      - name: home
        label: Startseite
        file: content/pages/home.json
        preview_path: ''
        fields:
          - label: Hero · Titel
            name: heroTitle
            widget: string
            hint: Die große Hauptüberschrift. Empfohlen sind höchstens 70 Zeichen.
            pattern: ['^.{1,70}$', 'Bitte verwenden Sie höchstens 70 Zeichen.']
          - label: Hero · Einleitung
            name: heroSubtitle
            widget: text
            hint: Ein kurzer einladender Absatz direkt unter der Überschrift.
            pattern: ['^[\s\S]{1,220}$', 'Bitte kürzen Sie den Text auf höchstens 220 Zeichen.']
          - label: Hero · Hauptbild
            name: heroImage
            widget: image
            choose_url: false
            media_library: &image_upload_limit
              config:
                max_file_size: 2500000
            hint: Ein ruhiges Querformat mit gut erkennbarem Hauptmotiv; empfohlen sind 1600 × 1000 Pixel.
          - label: Hero · Bildbeschreibung für Barrierefreiheit
            name: heroImageAlt
            widget: string
            hint: Beschreiben Sie knapp, was auf dem Bild zu sehen ist. Keine Dateinamen oder Werbeslogans.
            pattern: ['^[\s\S]{8,180}$', 'Bitte schreiben Sie eine aussagekräftige Bildbeschreibung mit 8 bis 180 Zeichen.']
          - label: Hero · Aquarellbild
            name: heroWatercolorImage
            widget: image
            choose_url: false
            media_library: *image_upload_limit
            hint: Die zum Hauptbild passende Aquarellvariante für den Übergangseffekt.
          - label: Hero · Text des Hauptbuttons
            name: primaryCtaLabel
            widget: string
            hint: Zum Beispiel „Angebote entdecken“. Höchstens 30 Zeichen.
            pattern: ['^.{1,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.']
          - label: Hero · Ziel des Hauptbuttons
            name: primaryCtaTarget
            widget: select
            hint: Wählen Sie ein festes Ziel, damit kein ungültiger Link entstehen kann.
            options:
              - { label: Angebote, value: /angebote }
              - { label: Veranstaltungen, value: /veranstaltungen }
              - { label: Über uns, value: /ueber-uns }
              - { label: Kontakt, value: /kontakt }
          - label: Willkommen · Kleine Überschrift
            name: welcomeEyebrow
            widget: string
            pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.']
          - label: Willkommen · Überschrift
            name: welcomeTitle
            widget: string
            pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.']
          - label: Willkommen · Inhalt
            name: welcomeBody
            widget: richtext
            buttons: [bold, italic, link, heading-two, heading-three, bulleted-list, numbered-list, quote]
            editor_components: []
            modes: [rich_text]
            sanitize_preview: true
            hint: Erzählen Sie kurz, was den Hof und die Arbeit mit den Pferden auszeichnet.
          - label: Willkommen · Bild
            name: welcomeImage
            widget: image
            choose_url: false
            media_library: *image_upload_limit
          - label: Willkommen · Bildbeschreibung für Barrierefreiheit
            name: welcomeImageAlt
            widget: string
            pattern: ['^[\s\S]{8,180}$', 'Bitte schreiben Sie eine aussagekräftige Bildbeschreibung mit 8 bis 180 Zeichen.']
          - label: Angebote · Kleine Überschrift
            name: offersEyebrow
            widget: string
            pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.']
          - label: Angebote · Überschrift
            name: offersTitle
            widget: string
            pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.']
          - label: Angebote · Hervorgehobene Angebote
            name: featuredOffers
            widget: relation
            collection: offers
            multiple: true
            min: 1
            max: 3
            search_fields: [title, summary]
            value_field: '{{slug}}'
            display_fields: ['{{title}} · {{category}}']
            filters:
              - field: published
                values: [true]
            hint: Wählen Sie ein bis drei sichtbare Angebote. Die Reihenfolge hier ist auch die Reihenfolge auf der Startseite.
          - label: Veranstaltung · Kleine Überschrift
            name: eventEyebrow
            widget: string
            pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.']
          - label: Veranstaltung · Hervorgehobener Termin
            name: featuredEvent
            widget: relation
            collection: events
            required: false
            search_fields: [title, date, description]
            value_field: '{{slug}}'
            display_fields: ['{{title}} · {{date}}']
            filters:
              - field: published
                values: [true]
              - field: state
                values: [scheduled, sold_out]
            hint: Optional. Ohne Auswahl wird der Terminbereich auf der Startseite ausgeblendet.
          - label: Kontakt · Kleine Überschrift
            name: contactEyebrow
            widget: string
            pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.']
          - label: Kontakt · Überschrift
            name: contactTitle
            widget: string
            pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.']
          - label: Kontakt · Einleitung
            name: contactBody
            widget: text
            pattern: ['^[\s\S]{1,260}$', 'Bitte kürzen Sie den Text auf höchstens 260 Zeichen.']
          - label: Kontakt · Bild
            name: contactImage
            widget: image
            choose_url: false
            media_library: *image_upload_limit
          - label: Kontakt · Bildbeschreibung für Barrierefreiheit
            name: contactImageAlt
            widget: string
            pattern: ['^[\s\S]{8,180}$', 'Bitte schreiben Sie eine aussagekräftige Bildbeschreibung mit 8 bis 180 Zeichen.']
          - label: Kontakt · Kurze Vorteile
            name: contactHighlights
            widget: list
            required: false
            default: []
            min: 1
            max: 4
            label_singular: Vorteil hinzufügen
            hint: Optional, höchstens vier kurze Punkte.
            field:
              label: Vorteil
              name: highlight
              widget: string
              pattern: ['^.{1,80}$', 'Bitte verwenden Sie höchstens 80 Zeichen.']
          - label: Kontakt · Text des Buttons
            name: contactCtaLabel
            widget: string
            pattern: ['^.{1,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.']
          - &seo_field
            label: SEO-Einstellungen
            name: seo
            widget: object
            required: false
            collapsed: true
            summary: Optionale Angaben für Suchmaschinen und geteilte Links
            hint: Die Website verwendet automatisch passende Standardwerte, wenn diese Felder leer bleiben.
            fields:
              - label: SEO-Titel
                name: title
                widget: string
                required: false
                hint: Höchstens 60 Zeichen. Wenn leer, wird die sichtbare Überschrift verwendet.
                pattern: ['^.{0,60}$', 'Bitte verwenden Sie höchstens 60 Zeichen.']
              - label: SEO-Beschreibung
                name: description
                widget: text
                required: false
                hint: Höchstens 160 Zeichen. Fassen Sie den Inhalt der Seite konkret zusammen.
                pattern: ['^[\s\S]{0,160}$', 'Bitte verwenden Sie höchstens 160 Zeichen.']
              - label: Vorschaubild für Social Media
                name: socialImage
                widget: image
                choose_url: false
                media_library: *image_upload_limit
                required: false
              - label: Bildbeschreibung des Vorschaubilds
                name: socialImageAlt
                widget: string
                required: false
                hint: Erforderlich, wenn ein eigenes Vorschaubild gewählt wird.
                pattern: ['^$|^[\s\S]{8,180}$', 'Bitte schreiben Sie eine aussagekräftige Bildbeschreibung mit 8 bis 180 Zeichen.']
              - label: Von Suchmaschinen ausschließen
                name: noIndex
                widget: boolean
                required: false
                default: false
                hint: Nur für Sonderfälle aktivieren. Die Seite bleibt trotzdem öffentlich erreichbar.

      - name: about
        label: Über uns
        file: content/pages/about.json
        preview_path: ueber-uns
        fields:
          - { label: Kleine Überschrift, name: eyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Seitentitel, name: title, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - label: Einleitung
            name: intro
            widget: text
            pattern: ['^[\s\S]{1,260}$', 'Bitte kürzen Sie den Text auf höchstens 260 Zeichen.']
          - { label: Philosophie · Kleine Überschrift, name: philosophyEyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Philosophie · Überschrift, name: philosophyTitle, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - label: Philosophie & Geschichte
            name: philosophyBody
            widget: richtext
            buttons: [bold, italic, link, heading-two, heading-three, bulleted-list, numbered-list, quote]
            editor_components: []
            modes: [rich_text]
            sanitize_preview: true
          - label: Philosophie · Bild
            name: philosophyImage
            widget: image
            choose_url: false
            media_library: *image_upload_limit
          - { label: Philosophie · Bildbeschreibung für Barrierefreiheit, name: philosophyImageAlt, widget: string, pattern: ['^[\s\S]{8,180}$', 'Bitte schreiben Sie eine aussagekräftige Bildbeschreibung mit 8 bis 180 Zeichen.'] }
          - { label: Team · Kleine Überschrift, name: teamEyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Team · Überschrift, name: teamTitle, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Team · Einleitung, name: teamIntro, widget: text, required: false, pattern: ['^[\s\S]{0,260}$', 'Bitte verwenden Sie höchstens 260 Zeichen.'] }
          - { label: Text des Kontaktbuttons, name: ctaLabel, widget: string, pattern: ['^.{1,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.'] }
          - *seo_field

      - name: contact
        label: Kontakt
        file: content/pages/contact.json
        preview_path: kontakt
        fields:
          - { label: Kleine Überschrift, name: eyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Seitentitel, name: title, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Einleitung, name: intro, widget: text, pattern: ['^[\s\S]{1,260}$', 'Bitte verwenden Sie höchstens 260 Zeichen.'] }
          - { label: Formular · Kleine Überschrift, name: formEyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Formular · Überschrift, name: formTitle, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Kontaktdaten · Kleine Überschrift, name: contactEyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Kontaktdaten · Überschrift, name: contactTitle, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - label: Hinweis zur Erreichbarkeit
            name: availabilityNote
            widget: text
            required: false
            hint: Optionaler Hinweis oberhalb der Kontaktdaten, zum Beispiel zur besten Anrufzeit.
            pattern: ['^[\s\S]{0,220}$', 'Bitte verwenden Sie höchstens 220 Zeichen.']
          - *seo_field

      - name: offers_page
        label: Angebotsübersicht
        file: content/pages/offers.json
        preview_path: angebote
        fields:
          - { label: Kleine Überschrift, name: eyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Seitentitel, name: title, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Einleitung, name: intro, widget: text, pattern: ['^[\s\S]{1,300}$', 'Bitte verwenden Sie höchstens 300 Zeichen.'] }
          - { label: Seminare · Kleine Überschrift, name: seminarEyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Seminare · Überschrift, name: seminarTitle, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Workshops · Kleine Überschrift, name: workshopEyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Workshops · Überschrift, name: workshopTitle, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Abschluss · Überschrift, name: ctaTitle, widget: string, required: false, pattern: ['^.{0,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Abschluss · Text, name: ctaBody, widget: text, required: false, pattern: ['^[\s\S]{0,260}$', 'Bitte verwenden Sie höchstens 260 Zeichen.'] }
          - { label: Abschluss · Button, name: ctaLabel, widget: string, required: false, pattern: ['^.{0,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.'] }
          - *seo_field

      - name: events_page
        label: Veranstaltungsübersicht
        file: content/pages/events.json
        preview_path: veranstaltungen
        fields:
          - { label: Kleine Überschrift, name: eyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Seitentitel, name: title, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Einleitung, name: intro, widget: text, pattern: ['^[\s\S]{1,300}$', 'Bitte verwenden Sie höchstens 300 Zeichen.'] }
          - { label: Kommende Termine · Kleine Überschrift, name: upcomingEyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Kommende Termine · Überschrift, name: upcomingTitle, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Vergangene Termine · Kleine Überschrift, name: pastEyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Vergangene Termine · Überschrift, name: pastTitle, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Text ohne kommende Termine, name: emptyState, widget: text, pattern: ['^[\s\S]{1,220}$', 'Bitte verwenden Sie höchstens 220 Zeichen.'] }
          - { label: Abschluss · Überschrift, name: ctaTitle, widget: string, required: false, pattern: ['^.{0,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Abschluss · Text, name: ctaBody, widget: text, required: false, pattern: ['^[\s\S]{0,260}$', 'Bitte verwenden Sie höchstens 260 Zeichen.'] }
          - { label: Abschluss · Button, name: ctaLabel, widget: string, required: false, pattern: ['^.{0,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.'] }
          - *seo_field

      - name: horses_page
        label: Pferdeübersicht
        file: content/pages/horses.json
        preview_path: pferde
        fields:
          - { label: Kleine Überschrift, name: eyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Seitentitel, name: title, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Einleitung, name: intro, widget: text, pattern: ['^[\s\S]{1,300}$', 'Bitte verwenden Sie höchstens 300 Zeichen.'] }
          - { label: Text ohne Pferdeprofile, name: emptyState, widget: text, pattern: ['^[\s\S]{1,220}$', 'Bitte verwenden Sie höchstens 220 Zeichen.'] }
          - { label: Abschluss · Überschrift, name: closingTitle, widget: string, required: false, pattern: ['^.{0,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Abschluss · Text, name: closingBody, widget: text, required: false, pattern: ['^[\s\S]{0,260}$', 'Bitte verwenden Sie höchstens 260 Zeichen.'] }
          - { label: Abschluss · Button, name: closingCtaLabel, widget: string, required: false, pattern: ['^.{0,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.'] }
          - *seo_field

      - name: prices_page
        label: Preise
        file: content/pages/prices.json
        preview_path: preise
        fields:
          - { label: Kleine Überschrift, name: eyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Seitentitel, name: title, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Einleitung, name: intro, widget: text, pattern: ['^[\s\S]{1,300}$', 'Bitte verwenden Sie höchstens 300 Zeichen.'] }
          - { label: Preishinweis · Überschrift, name: disclaimerTitle, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Preishinweis · Text, name: disclaimerBody, widget: text, pattern: ['^[\s\S]{1,300}$', 'Bitte verwenden Sie höchstens 300 Zeichen.'] }
          - { label: Hinweis für Unternehmen, name: companyNote, widget: text, required: false, pattern: ['^[\s\S]{0,300}$', 'Bitte verwenden Sie höchstens 300 Zeichen.'] }
          - { label: Abschluss · Überschrift, name: ctaTitle, widget: string, required: false, pattern: ['^.{0,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Abschluss · Text, name: ctaBody, widget: text, required: false, pattern: ['^[\s\S]{0,260}$', 'Bitte verwenden Sie höchstens 260 Zeichen.'] }
          - { label: Abschluss · Button, name: ctaLabel, widget: string, required: false, pattern: ['^.{0,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.'] }
          - *seo_field

      - name: gallery_page
        label: Galerie
        file: content/pages/gallery.json
        preview_path: galerie
        fields:
          - { label: Kleine Überschrift, name: eyebrow, widget: string, pattern: ['^.{1,45}$', 'Bitte verwenden Sie höchstens 45 Zeichen.'] }
          - { label: Seitentitel, name: title, widget: string, pattern: ['^.{1,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Einleitung, name: intro, widget: text, pattern: ['^[\s\S]{1,300}$', 'Bitte verwenden Sie höchstens 300 Zeichen.'] }
          - label: Kategorienamen
            name: categoryLabels
            widget: object
            collapsed: true
            summary: Beschriftung der fünf Galerie-Filter
            hint: Ändern Sie hier nur die sichtbaren Bezeichnungen. Die Zuordnung der Bilder bleibt erhalten.
            fields:
              - { label: Hof, name: hof, widget: string, pattern: ['^.{1,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.'] }
              - { label: Pferde, name: pferde, widget: string, pattern: ['^.{1,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.'] }
              - { label: Coaching, name: coaching, widget: string, pattern: ['^.{1,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.'] }
              - { label: Workshops, name: workshops, widget: string, pattern: ['^.{1,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.'] }
              - { label: Events, name: events, widget: string, pattern: ['^.{1,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.'] }
          - { label: Text ohne Galeriebilder, name: emptyState, widget: text, pattern: ['^[\s\S]{1,220}$', 'Bitte verwenden Sie höchstens 220 Zeichen.'] }
          - { label: Abschluss · Überschrift, name: ctaTitle, widget: string, required: false, pattern: ['^.{0,90}$', 'Bitte verwenden Sie höchstens 90 Zeichen.'] }
          - { label: Abschluss · Text, name: ctaBody, widget: text, required: false, pattern: ['^[\s\S]{0,260}$', 'Bitte verwenden Sie höchstens 260 Zeichen.'] }
          - { label: Abschluss · Button, name: ctaLabel, widget: string, required: false, pattern: ['^.{0,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.'] }
          - *seo_field

  - name: offers
    label: Angebote
    label_singular: Angebot
    description: Seminare, Workshops und die dazugehörigen Preisoptionen.
    folder: content/offers
    create: true
    slug: '{{slug}}'
    extension: md
    format: yaml-frontmatter
    preview_path: angebote/{{slug}}
    summary: '{{title}} · {{category}}'
    sortable_fields: [sortOrder, title, category, commit_date]
    view_filters:
      - { label: Auf Website sichtbar, field: published, pattern: true }
      - { label: Auf Website verborgen, field: published, pattern: false }
      - { label: Seminare, field: category, pattern: seminar }
      - { label: Workshops, field: category, pattern: workshop }
    view_groups:
      - { label: Kategorie, field: category }
    fields:
      - label: Titel
        name: title
        widget: string
        hint: Der sichtbare Name des Angebots. Beim ersten Speichern entsteht daraus die Webadresse.
        pattern: ['^.{2,100}$', 'Bitte verwenden Sie 2 bis 100 Zeichen.']
      - label: Auf Website anzeigen
        name: published
        widget: boolean
        default: true
        hint: Das Ausschalten verbirgt ein bereits veröffentlichtes Angebot. Ein gespeicherter Entwurf ist noch nicht automatisch öffentlich.
      - label: Kategorie
        name: category
        widget: select
        options:
          - { label: Seminar, value: seminar }
          - { label: Workshop, value: workshop }
      - label: Kurzbeschreibung
        name: summary
        widget: text
        hint: Wird auf Angebotskarten angezeigt. Empfohlen sind 90 bis 160 Zeichen, maximal 180.
        pattern: ['^[\s\S]{1,180}$', 'Bitte kürzen Sie die Kurzbeschreibung auf höchstens 180 Zeichen.']
      - label: Einleitung
        name: description
        widget: text
        hint: Kurzer Einstieg auf der Detailseite und Ersatz für eine leere SEO-Beschreibung.
        pattern: ['^[\s\S]{1,280}$', 'Bitte kürzen Sie die Einleitung auf höchstens 280 Zeichen.']
      - &richtext_body
        label: Ausführlicher Inhalt
        name: body
        widget: richtext
        buttons: [bold, italic, link, heading-two, heading-three, bulleted-list, numbered-list, quote]
        editor_components: []
        modes: [rich_text]
        sanitize_preview: true
        hint: Beschreiben Sie Ablauf, Nutzen und Atmosphäre. Die Seitenüberschrift wird automatisch ergänzt.
      - label: Hauptbild
        name: imageSrc
        widget: image
        choose_url: false
        media_library: *image_upload_limit
        hint: Empfohlen ist ein Querformat mit mindestens 1400 Pixel Breite und höchstens 2,5 MB.
      - label: Bildbeschreibung für Barrierefreiheit
        name: imageAlt
        widget: string
        hint: Beschreiben Sie das sichtbare Motiv, nicht den Dateinamen.
        pattern: ['^[\s\S]{8,180}$', 'Bitte schreiben Sie eine aussagekräftige Bildbeschreibung mit 8 bis 180 Zeichen.']
      - label: Das erwartet die Teilnehmer
        name: highlights
        widget: list
        min: 1
        max: 8
        label_singular: Punkt hinzufügen
        collapsed: false
        hint: Ein bis acht kurze, konkrete Vorteile oder Programmpunkte.
        field:
          label: Punkt
          name: highlight
          widget: string
          pattern: ['^.{2,100}$', 'Bitte verwenden Sie 2 bis 100 Zeichen.']
      - label: Zielgruppe
        name: audience
        widget: list
        required: false
        default: []
        min: 1
        max: 8
        label_singular: Zielgruppe hinzufügen
        hint: Optional. Für wen eignet sich das Angebot?
        field:
          label: Zielgruppe
          name: audienceItem
          widget: string
          pattern: ['^.{2,100}$', 'Bitte verwenden Sie 2 bis 100 Zeichen.']
      - { label: Format, name: format, widget: string, required: false, hint: 'Zum Beispiel: „Ganztägiger Workshop mit Theorie und Praxis“.', pattern: ['^.{0,140}$', 'Bitte verwenden Sie höchstens 140 Zeichen.'] }
      - { label: Teilnehmerzahl, name: participantCount, widget: string, required: false, hint: 'Zum Beispiel: „4–8 aktive Teilnehmer“.', pattern: ['^.{0,100}$', 'Bitte verwenden Sie höchstens 100 Zeichen.'] }
      - { label: Voraussetzungen, name: prerequisites, widget: text, required: false, pattern: ['^[\s\S]{0,300}$', 'Bitte verwenden Sie höchstens 300 Zeichen.'] }
      - { label: Besonderer Hinweis, name: specialNote, widget: text, required: false, pattern: ['^[\s\S]{0,300}$', 'Bitte verwenden Sie höchstens 300 Zeichen.'] }
      - label: Preise
        name: pricingOptions
        widget: list
        required: false
        collapsed: true
        summary: '{{fields.label}} · {{fields.price}}'
        label_singular: Preisoption hinzufügen
        min: 1
        max: 8
        hint: Legen Sie alle buchbaren Varianten direkt beim Angebot an.
        fields:
          - { label: Bezeichnung, name: label, widget: string, hint: 'Zum Beispiel: „Tagesworkshop“.', pattern: ['^.{2,80}$', 'Bitte verwenden Sie 2 bis 80 Zeichen.'] }
          - { label: Preis, name: price, widget: string, hint: 'Zum Beispiel: „120 €“, „ab 120 €“ oder „Preis auf Anfrage“.', pattern: ['^.{2,80}$', 'Bitte verwenden Sie 2 bis 80 Zeichen.'] }
          - { label: Einheit, name: unit, widget: string, required: false, hint: 'Zum Beispiel: „pro Person“ oder „pro Gruppe“.', pattern: ['^.{0,60}$', 'Bitte verwenden Sie höchstens 60 Zeichen.'] }
          - label: Enthaltene Leistungen
            name: features
            widget: list
            required: false
            default: []
            min: 1
            max: 8
            label_singular: Leistung hinzufügen
            field: { label: Leistung, name: feature, widget: string, pattern: ['^.{2,100}$', 'Bitte verwenden Sie 2 bis 100 Zeichen.'] }
          - { label: Hervorheben, name: highlighted, widget: boolean, default: false, hint: Pro Angebot darf höchstens eine Preisoption hervorgehoben sein. }
      - { label: Auf der Preisseite anzeigen, name: showOnPricesPage, widget: boolean, default: true, hint: Nur aktivieren, wenn mindestens eine Preisoption gepflegt ist. }
      - { label: Reihenfolge, name: sortOrder, widget: number, value_type: int, min: 0, max: 9999, default: 100, hint: Kleine Zahlen erscheinen zuerst. Bei gleicher Zahl wird alphabetisch sortiert. }
      - *seo_field

  - name: events
    label: Veranstaltungen
    label_singular: Veranstaltung
    description: Termine, Anmeldestatus und Veranstaltungsdetails. Ob ein Termin künftig oder vergangen ist, berechnet die Website aus dem Datum.
    folder: content/events
    create: true
    slug: '{{slug}}'
    extension: md
    format: yaml-frontmatter
    preview_path: veranstaltungen/{{slug}}
    summary: '{{title}} · {{date}} · {{state}}'
    sortable_fields: [date, sortOrder, title, state, commit_date]
    view_filters:
      - { label: Anmeldung möglich, field: state, pattern: scheduled }
      - { label: Ausgebucht, field: state, pattern: sold_out }
      - { label: Abgesagt, field: state, pattern: cancelled }
      - { label: Auf Website sichtbar, field: published, pattern: true }
      - { label: Auf Website verborgen, field: published, pattern: false }
    view_groups:
      - { label: Jahr, field: date, pattern: '\d{4}' }
      - { label: Kategorie, field: category }
    fields:
      - label: Titel
        name: title
        widget: string
        hint: Der sichtbare Veranstaltungsname. Beim ersten Speichern entsteht daraus die Webadresse.
        pattern: ['^.{2,110}$', 'Bitte verwenden Sie 2 bis 110 Zeichen.']
      - label: Auf Website anzeigen
        name: published
        widget: boolean
        default: true
        hint: Das Ausschalten verbirgt einen bereits veröffentlichten Termin. Ein gespeicherter Entwurf ist noch nicht automatisch öffentlich.
      - label: Anmeldestatus
        name: state
        widget: select
        default: scheduled
        hint: „Geplant“ zeigt den Anmeldebutton. „Ausgebucht“ und „Abgesagt“ deaktivieren ihn.
        options:
          - { label: Geplant · Anmeldung möglich, value: scheduled }
          - { label: Ausgebucht, value: sold_out }
          - { label: Abgesagt, value: cancelled }
      - label: Startdatum
        name: date
        widget: datetime
        date_format: DD.MM.YYYY
        time_format: false
        format: YYYY-MM-DD
        picker_utc: false
      - label: Enddatum
        name: endDate
        widget: datetime
        required: false
        date_format: DD.MM.YYYY
        time_format: false
        format: YYYY-MM-DD
        picker_utc: false
        hint: Nur bei mehrtägigen Veranstaltungen ausfüllen. Das Enddatum darf nicht vor dem Start liegen.
      - label: Beginn
        name: startTime
        widget: string
        required: false
        hint: Optional im 24-Stunden-Format, zum Beispiel 09:30.
        pattern: ['^$|^(?:[01]\d|2[0-3]):[0-5]\d$', 'Bitte verwenden Sie das Format HH:MM, zum Beispiel 09:30.']
      - label: Ende
        name: endTime
        widget: string
        required: false
        hint: Optional im 24-Stunden-Format, zum Beispiel 16:00.
        pattern: ['^$|^(?:[01]\d|2[0-3]):[0-5]\d$', 'Bitte verwenden Sie das Format HH:MM, zum Beispiel 16:00.']
      - label: Ort
        name: location
        widget: string
        default: See-Pferde Zwenkau, Zwenkau
        pattern: ['^.{2,140}$', 'Bitte verwenden Sie 2 bis 140 Zeichen.']
      - label: Kategorie
        name: category
        widget: select
        options:
          - { label: Seminar, value: seminar }
          - { label: Workshop, value: workshop }
      - label: Zugehöriges Angebot
        name: relatedOffer
        widget: relation
        collection: offers
        required: false
        search_fields: [title, summary]
        value_field: '{{slug}}'
        display_fields: ['{{title}} · {{category}}']
        filters:
          - field: published
            values: [true]
        hint: Optional. Verknüpft den Termin mit der passenden Angebotsseite.
      - label: Kurzbeschreibung
        name: description
        widget: text
        hint: Wird auf Terminkarten angezeigt und als SEO-Ersatz verwendet. Maximal 220 Zeichen.
        pattern: ['^[\s\S]{1,220}$', 'Bitte kürzen Sie die Kurzbeschreibung auf höchstens 220 Zeichen.']
      - *richtext_body
      - label: Hauptbild
        name: imageSrc
        widget: image
        choose_url: false
        media_library: *image_upload_limit
        hint: Empfohlen ist ein Querformat mit mindestens 1400 Pixel Breite und höchstens 2,5 MB.
      - { label: Bildbeschreibung für Barrierefreiheit, name: imageAlt, widget: string, pattern: ['^[\s\S]{8,180}$', 'Bitte schreiben Sie eine aussagekräftige Bildbeschreibung mit 8 bis 180 Zeichen.'] }
      - label: Highlights
        name: highlights
        widget: list
        min: 1
        max: 8
        label_singular: Highlight hinzufügen
        field: { label: Highlight, name: highlight, widget: string, pattern: ['^.{2,100}$', 'Bitte verwenden Sie 2 bis 100 Zeichen.'] }
      - { label: Teilnehmerzahl, name: capacity, widget: string, required: false, hint: 'Zum Beispiel: „4–8 Personen“.', pattern: ['^.{0,100}$', 'Bitte verwenden Sie höchstens 100 Zeichen.'] }
      - { label: Preisangabe, name: priceDisplay, widget: string, required: false, hint: 'Nur für diesen Termin, zum Beispiel: „120 € pro Person“.', pattern: ['^.{0,100}$', 'Bitte verwenden Sie höchstens 100 Zeichen.'] }
      - { label: Text des Anmeldebuttons, name: registrationLabel, widget: string, required: false, default: Jetzt anmelden, hint: Falls leer, wird „Jetzt anmelden“ verwendet., pattern: ['^.{0,30}$', 'Bitte verwenden Sie höchstens 30 Zeichen.'] }
      - { label: Reihenfolge bei gleichem Datum, name: sortOrder, widget: number, value_type: int, min: 0, max: 9999, default: 100, hint: Kleine Zahlen erscheinen zuerst. }
      - *seo_field

