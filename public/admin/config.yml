        label_singular: Qualifikation hinzufügen
        field: { label: Qualifikation, name: qualification, widget: string, pattern: ['^.{2,120}$', 'Bitte verwenden Sie 2 bis 120 Zeichen.'] }
      - { label: Reihenfolge, name: sortOrder, widget: number, value_type: int, min: 0, max: 9999, default: 100, hint: Kleine Zahlen erscheinen zuerst. }

  - name: horses
