      - { label: Bildbeschreibung für Barrierefreiheit, name: alt, widget: string, hint: Beschreiben Sie Motiv und Situation. Keine Dateinamen., pattern: ['^[\s\S]{8,180}$', 'Bitte schreiben Sie eine aussagekräftige Bildbeschreibung mit 8 bis 180 Zeichen.'] }
      - { label: Bildunterschrift, name: caption, widget: text, required: false, hint: Optionaler sichtbarer Zusatz in der vergrößerten Ansicht., pattern: ['^[\s\S]{0,220}$', 'Bitte verwenden Sie höchstens 220 Zeichen.'] }
      - label: Kategorie
        name: category
        widget: select
        options:
          - { label: Hof, value: hof }
          - { label: Pferde, value: pferde }
          - { label: Coaching, value: coaching }
          - { label: Workshops, value: workshops }
          - { label: Events, value: events }
      - label: Zugehöriges Pferd
        name: relatedHorse
        widget: relation
        collection: horses
        required: false
        search_fields: [name, breed]
        value_field: '{{slug}}'
