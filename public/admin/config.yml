        filters:
          - field: published
            values: [true]
      - label: Zugehörige Veranstaltung
        name: relatedEvent
        widget: relation
        collection: events
        required: false
        search_fields: [title, date]
        value_field: '{{slug}}'
        display_fields: ['{{title}} · {{date}}']
        filters:
          - field: published
            values: [true]
      - { label: Reihenfolge, name: sortOrder, widget: number, value_type: int, min: 0, max: 9999, default: 100, hint: Kleine Zahlen erscheinen zuerst. }

  - name: announcements
    label: Hinweise & Banner
    label_singular: Hinweis
