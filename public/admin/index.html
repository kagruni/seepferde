<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#4a6741" />
    <title>Website-Verwaltung | See-Pferde Zwenkau</title>
    <link rel="icon" href="/icons/logo.svg" type="image/svg+xml" />
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <link rel="stylesheet" href="/admin/dialogs.css" />
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #eff0f4;
        color: #3d2e1f;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #eff0f4;
      }

      #nc-root {
        min-height: 100vh;
      }

      /* Keep the editor fully site-branded. Decap's vendor credit is injected
         dynamically after the CMS script initializes. */
      #nc-root [class*="NetlifyCreditIcon"],
      #nc-root a[href*="decapcms.org"],
      #nc-root a[href*="netlifycms.org"] {
        display: none !important;
      }

      .admin-boot {
        position: fixed;
        z-index: 9999;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #faf7f2;
      }

      .admin-boot__card {
        width: min(100%, 420px);
        padding: 32px;
        border: 1px solid #d9d0c2;
        border-radius: 18px;
        background: #fffdf9;
        box-shadow: 0 18px 50px rgb(61 46 31 / 10%);
        text-align: center;
      }

      .admin-boot__logo {
        width: 84px;
        height: 84px;
        object-fit: contain;
      }

      .admin-boot h1 {
        margin: 18px 0 8px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.5rem, 4vw, 2rem);
        line-height: 1.2;
      }

      .admin-boot p {
        margin: 0;
        color: #6b5e50;
        line-height: 1.6;
      }

      .admin-boot__status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 20px;
        color: #4a6741;
        font-weight: 700;
      }

      .admin-boot__status::before {
        width: 16px;
        height: 16px;
        border: 2px solid #b9c8b4;
        border-top-color: #4a6741;
        border-radius: 50%;
        content: "";
        animation: admin-spin 0.8s linear infinite;
      }

      .admin-boot[data-error="true"] .admin-boot__status {
        color: #9b2c2c;
      }

      .admin-boot[data-error="true"] .admin-boot__status::before {
        border: 0;
        border-radius: 0;
        content: "!";
        animation: none;
        font-size: 1rem;
      }

      @keyframes admin-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .admin-boot__status::before {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="admin-boot" id="admin-boot" role="status" aria-live="polite">
      <div class="admin-boot__card">
        <img
          class="admin-boot__logo"
          src="/icons/logo.svg"
          alt="See-Pferde Zwenkau"
        />
        <h1>Website-Verwaltung</h1>
        <p>Melden Sie sich mit Ihrem persönlichen Benutzernamen und Passwort an.</p>
        <div class="admin-boot__status" id="admin-boot-status">CMS wird geladen</div>
      </div>
    </div>
    <noscript>
      Für die Website-Verwaltung muss JavaScript in Ihrem Browser aktiviert sein.
    </noscript>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="/admin/dialogs.js"></script>
    <script src="/admin/decap-cms.js"></script>
    <script src="/admin/preview.js"></script>
  </body>
</html>
